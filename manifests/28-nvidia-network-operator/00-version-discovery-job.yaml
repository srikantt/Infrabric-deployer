apiVersion: v1
kind: ServiceAccount
metadata:
  name: nic-policy-updater
  namespace: nvidia-network-operator
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nic-policy-updater
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
- apiGroups: ["operators.coreos.com"]
  resources: ["clusterserviceversions"]
  verbs: ["get", "list"]
- apiGroups: ["mellanox.com"]
  resources: ["nicclusterpolicies"]
  verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nic-policy-updater
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nic-policy-updater
subjects:
- kind: ServiceAccount
  name: nic-policy-updater
  namespace: nvidia-network-operator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: discover-ofed-version
  namespace: nvidia-network-operator
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      serviceAccountName: nic-policy-updater
      restartPolicy: OnFailure
      containers:
      - name: version-discoverer
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: OFED_VERSION_OVERRIDE
          value: ""
        - name: OFED_IMAGE_OVERRIDE
          value: ""
        - name: OFED_REPO_OVERRIDE
          value: ""
        command:
        - /bin/bash
        - -c
        - |
          set -e

          if [ -n "$OFED_VERSION_OVERRIDE" ]; then
            echo "Using user-specified OFED version: $OFED_VERSION_OVERRIDE"
            VERSION="$OFED_VERSION_OVERRIDE"
          else
            echo "Discovering NVIDIA Network Operator default OFED version..."

            # Wait for operator ClusterServiceVersion to exist
            timeout=60
            while [ $timeout -gt 0 ]; do
              CSV_NAME=$(oc get csv -n nvidia-network-operator -o name 2>/dev/null | grep nvidia-network-operator || echo "")
              if [ -n "$CSV_NAME" ]; then
                echo "Operator CSV found: $CSV_NAME"
                break
              fi
              echo "Waiting for operator CSV... ($timeout seconds left)"
              sleep 5
              timeout=$((timeout - 5))
            done

            if [ -z "$CSV_NAME" ]; then
              echo "ERROR: Could not find NVIDIA Network Operator CSV"
              exit 1
            fi

            # Extract default OFED version from CSV alm-examples using Python
            VERSION=$(oc get $CSV_NAME -n nvidia-network-operator -o jsonpath='{.metadata.annotations.alm-examples}' | \
              python3 -c "import json,sys;examples=json.load(sys.stdin);print([item.get('spec',{}).get('ofedDriver',{}).get('version','') for item in examples if item.get('kind')=='NicClusterPolicy'][0])" 2>&1)

            if [ -z "$VERSION" ] || [ "$VERSION" = "None" ]; then
              echo "ERROR: Could not discover OFED version from operator CSV"
              exit 1
            fi

            echo "Discovered OFED version: $VERSION"
          fi

          OFED_IMAGE="${OFED_IMAGE_OVERRIDE:-doca-driver}"
          OFED_REPO="${OFED_REPO_OVERRIDE:-nvcr.io/nvidia/mellanox}"
          echo "Using image: $OFED_REPO/$OFED_IMAGE:$VERSION"

          # Check if NicClusterPolicy already exists with this version
          EXISTING_VERSION=$(oc get nicclusterpolicy nic-cluster-policy -n nvidia-network-operator \
            -o jsonpath='{.spec.ofedDriver.version}' 2>/dev/null || echo "")

          if [ "$EXISTING_VERSION" = "$VERSION" ]; then
            echo "NicClusterPolicy already exists with correct version $VERSION - skipping"
            exit 0
          fi

          if [ -n "$EXISTING_VERSION" ]; then
            echo "NicClusterPolicy exists with version $EXISTING_VERSION, updating to $VERSION"
          else
            echo "Creating new NicClusterPolicy with version $VERSION"
          fi

          # Create or update NicClusterPolicy with discovered version
          cat <<POLICY | oc apply -f -
          apiVersion: mellanox.com/v1alpha1
          kind: NicClusterPolicy
          metadata:
            name: nic-cluster-policy
            namespace: nvidia-network-operator
          spec:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
                  - key: node-role.kubernetes.io/master
                    operator: DoesNotExist
            ofedDriver:
              image: $OFED_IMAGE
              repository: $OFED_REPO
              version: $VERSION
              env:
                - name: UNLOAD_STORAGE_MODULES
                  value: 'true'
              livenessProbe:
                initialDelaySeconds: 30
                periodSeconds: 30
              readinessProbe:
                initialDelaySeconds: 10
                periodSeconds: 30
              startupProbe:
                initialDelaySeconds: 10
                periodSeconds: 20
              terminationGracePeriodSeconds: 300
              upgradePolicy:
                autoUpgrade: true
                drain:
                  enable: true
                  force: true
                  deleteEmptyDir: true
                  timeoutSeconds: 300
                  podSelector: ''
                maxParallelUpgrades: 2
          POLICY

          echo "NicClusterPolicy successfully configured with version: $VERSION"
